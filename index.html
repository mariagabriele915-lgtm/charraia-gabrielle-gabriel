<style>

body{
    margin:0;
    font-family: 'Trebuchet MS', sans-serif;
    background:#fff3e6;
    background-image:
    linear-gradient(45deg, rgba(255,255,255,0.3) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.3) 25%, transparent 25%);
    background-size:40px 40px;
    color:#5c2e00;
    text-align:center;
}

header{
    background:#f4c38b;
    padding:50px 20px;
    border-bottom:8px dashed #d2691e;
    position:relative;
}

header::after{
    content:"🎏 🎏 🎏 🎏 🎏";
    display:block;
    font-size:28px;
    margin-top:20px;
}

h1{
    font-size:50px;
    margin:0;
    color:#8b4513;
    text-shadow:2px 2px #ffe2b8;
}

h2{
    margin-top:10px;
    font-size:28px;
}

.info{
    margin-top:25px;
    font-size:20px;
    line-height:1.8;
}

.container{
    padding:40px 20px;
}

.mensagem{
    max-width:750px;
    margin:auto;
    font-size:22px;
    line-height:1.8;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

input{
    padding:16px;
    width:80%;
    max-width:380px;
    border-radius:14px;
    border:3px solid #d2691e;
    margin-top:30px;
    font-size:16px;
    background:#fffaf5;
}

.lista{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:45px;
}

.card{
    background:#fffdf9;
    width:240px;
    padding:22px;
    border-radius:22px;
    border:3px dashed #f4b15f;
    box-shadow:0 5px 12px rgba(0,0,0,0.08);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card h3{
    margin-top:0;
    font-size:22px;
}

button{
    background:#d2691e;
    color:white;
    border:none;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    width:100%;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.reservado{
    background:#8c8c8c !important;
    cursor:not-allowed;
}

footer{
    margin-top:60px;
    padding:35px;
    background:#f4c38b;
    font-size:22px;
    border-top:8px dashed #d2691e;
}

</style>
